name: CD

on:
  workflow_run:
    workflows: [ CI ]
    types: [ completed ]
    branches: [ main ]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker 이미지 빌드 및 푸시
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/moamoa:latest
            ${{ secrets.DOCKER_USERNAME }}/moamoa:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: EC2 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/moamoa:latest
            docker stop moamoa || true
            docker rm moamoa || true
            docker run -d \
              --name moamoa \
              --restart unless-stopped \
              -p 8080:8080 \
              --env-file /home/${{ secrets.EC2_USERNAME }}/moamoa/.env \
              ${{ secrets.DOCKER_USERNAME }}/moamoa:latest
            docker image prune -f

      - name: 헬스체크
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            for i in 1 2 3 4 5; do
              sleep 5
              if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
                echo "헬스체크 성공"
                exit 0
              fi
              echo "헬스체크 대기 중... ($i/5)"
            done
            echo "헬스체크 실패"
            exit 1
